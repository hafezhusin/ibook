name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: PHP ${{ matrix.php }} — Syntax & Style
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_mysql, tokenizer, xml, ctype, json, bcmath
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      - name: Check PHP syntax (all source files)
        run: |
          find app config database routes -name "*.php" | \
          xargs -P4 -I{} php -l {} | grep -v "No syntax errors" || true
          find app config database routes -name "*.php" | \
          xargs -P4 php -l | grep -c "No syntax errors"

      - name: Run Laravel Pint (code style check)
        run: ./vendor/bin/pint --test
