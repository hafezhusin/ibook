name: CI

# Jalankan pada setiap push ke main dan setiap pull request
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Tests · PHPStan · Pint · Audit
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. PHP 8.3 + Xdebug ──────────────────────────────────────────────────
      #    composer.lock dijana dengan PHP 8.3 (Laragon) — pakej seperti
      #    maennchen/zipstream-php 3.2.2 memerlukan php-64bit ^8.3.
      #    Xdebug digunakan (bukan PCOV) supaya peratusan coverage konsisten
      #    dengan persekitaran tempatan — elak false negative pada --min=70.
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, sqlite3, intl, mbstring
          coverage: xdebug

      # ── 3. Cache vendor/ ─────────────────────────────────────────────────────
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      # ── 4. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # ── 5. Sedia persekitaran ─────────────────────────────────────────────────
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          # Pastikan direktori storage wujud (fresh checkout mungkin tiada subdirektori)
          mkdir -p storage/framework/{sessions,views,cache/data}
          mkdir -p storage/logs
          chmod -R 755 storage bootstrap/cache

      # ── 6. PHPUnit + coverage (ambang minimum 70%) ───────────────────────────
      #    phpunit.xml mengecualikan Mail/, Notifications/, BackupService dll.
      #    daripada kiraan coverage. --min=70 akan fail jika di bawah ambang.
      - name: Run PHPUnit (>= 70% line coverage)
        run: php artisan test --coverage --min=70

      # ── 7. PHPStan Level 5 ────────────────────────────────────────────────────
      #    phpstan-baseline.neon hanya mengandungi 2 ralat Socialite (library).
      #    Semua ralat baharu akan menyebabkan CI gagal.
      - name: PHPStan – Level 5
        run: vendor/bin/phpstan analyse --no-progress

      # ── 8. Laravel Pint – semak gaya kod ─────────────────────────────────────
      #    --test = dry run; gagal jika ada fail yang perlu diformat semula.
      - name: Laravel Pint – style check
        run: vendor/bin/pint --test

      # ── 9. composer audit – imbasan CVE ──────────────────────────────────────
      #    Semak dependency PRODUKSI terhadap pangkalan data kerentanan PHP.
      #    --no-dev: pakej dev (PHPUnit dll.) dikecualikan — kami peduli
      #    tentang apa yang berjalan di pelayan, bukan alat pembangunan.
      #    CI gagal (exit 3) jika ada CVE; exit 2 (abandoned-only) diabaikan.
      - name: Security audit (composer audit)
        run: composer audit --no-dev
